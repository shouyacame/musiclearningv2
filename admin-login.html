<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三線学習システム - 管理者ログイン</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <script src="supabase-config.js"></script>
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    .bg-hero { background: linear-gradient(135deg, #C4B5E8 0%, #A897D8 50%, #B5A6E0 100%); min-height: 100vh; }
    .card { background: #fff; border-radius: 20px; box-shadow: 0 25px 60px rgba(100,80,180,0.18); }
    .tab-active   { background: #8B7BC8; color: #fff; }
    .tab-inactive { color: #666; }
    .tab-inactive:hover { background: #f5f5f5; }
    .inp { width: 100%; padding: 11px 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; transition: border-color .2s; }
    .inp:focus { outline: none; border-color: #8B7BC8; }
    .btn-indigo { background: linear-gradient(135deg, #8B7BC8, #9B8BD8); color: #fff; border: none; border-radius: 12px; padding: 13px 20px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; font-family: 'Noto Sans JP', sans-serif; transition: all .3s; }
    .btn-indigo:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(139,123,200,.4); }
    .btn-indigo:disabled { opacity: .65; cursor: not-allowed; }
  </style>
</head>
<body class="bg-hero flex items-center justify-center p-4 min-h-screen">
  <div class="w-full max-w-md">

    <div class="text-center mb-7">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-white/10 backdrop-blur-sm mb-3">
        <i class="fas fa-shield-alt text-4xl text-white/80"></i>
      </div>
      <h1 class="text-3xl font-bold text-white">三線学習システム</h1>
      <p class="text-white/50 text-sm mt-1">管理者ポータル</p>
    </div>

    <!-- 読み込み中 -->
    <div id="loading-card" class="card p-8 text-center">
      <i class="fas fa-spinner fa-spin text-2xl text-indigo-400 mb-3 block"></i>
      <p class="text-sm text-gray-400">確認中...</p>
    </div>

    <!-- ログインカード（管理者が既に存在する場合） -->
    <div id="login-card" class="card p-8 hidden">
      <h2 class="text-lg font-bold text-gray-800 mb-6 text-center">管理者ログイン</h2>
      <form onsubmit="doLogin(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">メールアドレス</label>
          <input type="email" id="l-email" class="inp" placeholder="admin@example.com" required autocomplete="email">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">パスワード</label>
          <div class="relative">
            <input type="password" id="l-pass" class="inp pr-11" placeholder="パスワード" required autocomplete="current-password">
            <button type="button" onclick="togglePw('l-pass','l-pw-icon')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <i id="l-pw-icon" class="fas fa-eye text-sm"></i>
            </button>
          </div>
        </div>
        <div id="l-err" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
        <button type="submit" id="l-btn" class="btn-indigo">
          <i class="fas fa-sign-in-alt mr-2"></i>ログイン
        </button>
      </form>
    </div>

    <!-- 初回セットアップカード（管理者が1人もいない場合） -->
    <div id="setup-card" class="card p-8 hidden">
      <div class="flex items-center gap-2 mb-1">
        <i class="fas fa-rocket text-indigo-500"></i>
        <h2 class="text-lg font-bold text-gray-800">初回セットアップ</h2>
      </div>
      <p class="text-xs text-gray-400 mb-6">管理者アカウントがまだ登録されていません。<br>最初の管理者アカウントを作成してください。</p>

      <form onsubmit="doSetup(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">メールアドレス <span class="text-red-500">*</span></label>
          <input type="email" id="s-email" class="inp" placeholder="admin@example.com" required autocomplete="email">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">管理者名</label>
          <input type="text" id="s-name" class="inp" placeholder="システム管理者" value="管理者">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">パスワード <span class="text-red-500">*</span></label>
          <div class="relative">
            <input type="password" id="s-pass" class="inp pr-11" placeholder="8文字以上" required minlength="8" autocomplete="new-password">
            <button type="button" onclick="togglePw('s-pass','s-pw-icon')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <i id="s-pw-icon" class="fas fa-eye text-sm"></i>
            </button>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">パスワード確認 <span class="text-red-500">*</span></label>
          <input type="password" id="s-pass2" class="inp" placeholder="もう一度入力" required minlength="8" autocomplete="new-password">
        </div>
        <div id="s-err" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
        <button type="submit" id="s-btn" class="btn-indigo">
          <i class="fas fa-user-shield mr-2"></i>管理者アカウントを作成
        </button>
      </form>
    </div>

  </div>

  <script>
    function togglePw(inputId, iconId) {
      const inp = document.getElementById(inputId);
      const ic  = document.getElementById(iconId);
      inp.type  = inp.type === 'password' ? 'text' : 'password';
      ic.className = inp.type === 'text' ? 'fas fa-eye-slash text-sm' : 'fas fa-eye text-sm';
    }

    async function doLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('l-email').value.trim();
      const password = document.getElementById('l-pass').value;
      const btn      = document.getElementById('l-btn');
      const errEl    = document.getElementById('l-err');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>ログイン中...';

      const { data, error } = await db.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = 'メールアドレスまたはパスワードが正しくありません。';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>ログイン';
        return;
      }

      const { data: profile } = await db.from('admin_profiles')
        .select('id').eq('id', data.user.id).maybeSingle();

      if (profile) {
        window.location.href = 'admin.html';
        return;
      }

      await db.auth.signOut();
      errEl.textContent = 'このアカウントには管理者権限がありません。';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>ログイン';
    }

    async function doSetup(e) {
      e.preventDefault();
      const email = document.getElementById('s-email').value.trim();
      const name  = document.getElementById('s-name').value.trim() || '管理者';
      const pass1 = document.getElementById('s-pass').value;
      const pass2 = document.getElementById('s-pass2').value;
      const btn   = document.getElementById('s-btn');
      const errEl = document.getElementById('s-err');
      errEl.classList.add('hidden');

      if (pass1 !== pass2) {
        errEl.textContent = 'パスワードが一致しません。';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>作成中...';

      // Step1: Supabase Authアカウント作成（既存の場合はスキップ）
      const { error: signUpErr } = await db.auth.signUp({ email, password: pass1 });
      // signUpErr は「既に登録済み」の場合も出るが次のsignInで対応するため無視

      // Step2: 必ずsignInしてセッションを確立（INSERTにはauthenticated権限が必要）
      const { data: siData, error: siErr } = await db.auth.signInWithPassword({ email, password: pass1 });
      if (siErr || !siData?.user) {
        const msg = siErr?.message || '';
        let userMsg = '';
        if (msg.toLowerCase().includes('confirm') || msg.toLowerCase().includes('verified') || msg.toLowerCase().includes('email')) {
          userMsg = `📧 メール確認が必要です。<br><br>Gmailに届いた <strong>Supabaseからの確認メール</strong> のリンクをクリックしてから、もう一度「管理者アカウントを作成」を押してください。<br><br><small style="color:#888">または Supabase Dashboard → Authentication → Providers → Email → 「Confirm email」をOFFにしてください。</small>`;
        } else {
          userMsg = `ログイン失敗: ${msg}<br><br><small style="color:#888">このメールアドレスで先生アカウントを作ったことがある場合は、そのパスワードを入力してください。</small>`;
        }
        errEl.innerHTML = userMsg;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-shield mr-2"></i>管理者アカウントを作成';
        return;
      }

      // Step3: セッション確立後にadmin_profilesへ登録
      const { error: insertErr } = await db.from('admin_profiles').insert({
        id: siData.user.id, email, name
      });
      if (insertErr) {
        errEl.textContent = '登録に失敗しました: ' + insertErr.message;
        errEl.classList.remove('hidden');
        await db.auth.signOut();
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-shield mr-2"></i>管理者アカウントを作成';
        return;
      }

      window.location.href = 'admin.html';
    }

    async function init() {
      // ログイン済みなら管理者チェック
      const { data: { session } } = await db.auth.getSession();
      if (session) {
        const { data: profile } = await db.from('admin_profiles')
          .select('id').eq('id', session.user.id).maybeSingle();
        if (profile) { window.location.href = 'admin.html'; return; }
        // ログイン済みだが管理者でない → サインアウトしてフローを続ける
        await db.auth.signOut();
      }

      // 管理者が存在するかチェック（公開RPC）
      const { data: exists, error } = await db.rpc('admin_exists');

      document.getElementById('loading-card').classList.add('hidden');

      if (error || exists === null) {
        // RPCが存在しない場合（SQL未実行）はセットアップ画面を表示
        document.getElementById('setup-card').classList.remove('hidden');
        return;
      }

      if (exists) {
        document.getElementById('login-card').classList.remove('hidden');
      } else {
        document.getElementById('setup-card').classList.remove('hidden');
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
