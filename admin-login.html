<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三線学習システム - 管理者ログイン</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <script src="supabase-config.js"></script>
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    .bg-hero { background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); min-height: 100vh; }
    .card { background: #fff; border-radius: 20px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); }
    .inp { width: 100%; padding: 11px 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; transition: border-color .2s; }
    .inp:focus { outline: none; border-color: #4F46E5; }
    .btn-indigo { background: linear-gradient(135deg, #4F46E5, #7C3AED); color: #fff; border: none; border-radius: 12px; padding: 13px 20px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; font-family: 'Noto Sans JP', sans-serif; transition: all .3s; }
    .btn-indigo:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,70,229,.4); }
    .btn-indigo:disabled { opacity: .65; cursor: not-allowed; }
  </style>
</head>
<body class="bg-hero flex items-center justify-center p-4 min-h-screen">
  <div class="w-full max-w-md">

    <div class="text-center mb-7">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-white/10 backdrop-blur-sm mb-3">
        <i class="fas fa-shield-alt text-4xl text-white/80"></i>
      </div>
      <h1 class="text-3xl font-bold text-white">三線学習システム</h1>
      <p class="text-white/50 text-sm mt-1">管理者ポータル</p>
    </div>

    <div class="card p-8">
      <h2 class="text-lg font-bold text-gray-800 mb-6 text-center">管理者ログイン</h2>

      <form onsubmit="doLogin(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">メールアドレス</label>
          <input type="email" id="l-email" class="inp" placeholder="admin@example.com" required autocomplete="email">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">パスワード</label>
          <div class="relative">
            <input type="password" id="l-pass" class="inp pr-11" placeholder="パスワード" required autocomplete="current-password">
            <button type="button" onclick="togglePw()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <i id="pw-icon" class="fas fa-eye text-sm"></i>
            </button>
          </div>
        </div>
        <div id="l-err" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
        <button type="submit" id="l-btn" class="btn-indigo">
          <i class="fas fa-sign-in-alt mr-2"></i>ログイン
        </button>
      </form>

      <!-- 初回セットアップ（ログイン後・管理者未登録時に表示） -->
      <div id="setup-section" class="hidden mt-6 pt-6 border-t border-gray-100">
        <div class="bg-indigo-50 border border-indigo-200 rounded-xl p-4 mb-4">
          <p class="text-sm font-semibold text-indigo-800 mb-1"><i class="fas fa-info-circle mr-1"></i>初回セットアップ</p>
          <p class="text-xs text-indigo-600">管理者が未登録です。このアカウントを管理者として登録しますか？</p>
        </div>
        <div class="space-y-3 mb-4">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">管理者名</label>
            <input type="text" id="setup-name" class="inp" placeholder="例: システム管理者" value="管理者">
          </div>
        </div>
        <button onclick="doSetup()" id="setup-btn" class="btn-indigo">
          <i class="fas fa-user-shield mr-2"></i>管理者として登録する
        </button>
        <button onclick="doLogout()" class="mt-2 w-full text-center text-xs text-gray-400 hover:text-gray-600 py-2">
          別のアカウントでログイン
        </button>
      </div>
    </div>

    <p class="text-center text-white/30 text-xs mt-6">
      <i class="fas fa-lock mr-1"></i>このページは管理者専用です
    </p>
  </div>

  <script>
    function togglePw() {
      const inp = document.getElementById('l-pass');
      const ic  = document.getElementById('pw-icon');
      inp.type  = inp.type === 'password' ? 'text' : 'password';
      ic.className = inp.type === 'text' ? 'fas fa-eye-slash text-sm' : 'fas fa-eye text-sm';
    }

    async function doLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('l-email').value.trim();
      const password = document.getElementById('l-pass').value;
      const btn      = document.getElementById('l-btn');
      const errEl    = document.getElementById('l-err');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>ログイン中...';

      const { data, error } = await db.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = 'メールアドレスまたはパスワードが正しくありません。';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>ログイン';
        return;
      }

      // 管理者判定
      const { data: adminProfile } = await db.from('admin_profiles')
        .select('id').eq('id', data.user.id).maybeSingle();

      if (adminProfile) {
        window.location.href = 'admin.html';
        return;
      }

      // 管理者未登録 → 他に管理者がいるか確認
      const { data: anyAdmin } = await db.from('admin_profiles').select('id').limit(1);
      if (anyAdmin && anyAdmin.length > 0) {
        errEl.textContent = 'このアカウントには管理者権限がありません。';
        errEl.classList.remove('hidden');
        await db.auth.signOut();
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>ログイン';
        return;
      }

      // 管理者が1人もいない → 初回セットアップを表示
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>ログイン';
      document.getElementById('setup-section').classList.remove('hidden');
    }

    async function doSetup() {
      const name  = document.getElementById('setup-name').value.trim() || '管理者';
      const btn   = document.getElementById('setup-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>登録中...';

      const { data: { session } } = await db.auth.getSession();
      if (!session) { alert('ログインセッションが切れました。再度ログインしてください。'); window.location.reload(); return; }

      const { error } = await db.from('admin_profiles').insert({
        id: session.user.id, email: session.user.email, name
      });

      if (error) {
        alert('登録に失敗しました: ' + error.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-shield mr-2"></i>管理者として登録する';
        return;
      }

      window.location.href = 'admin.html';
    }

    async function doLogout() {
      await db.auth.signOut();
      window.location.reload();
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const { data } = await db.auth.getSession();
      if (!data?.session) return;

      // ログイン済みなら管理者チェック
      const { data: adminProfile } = await db.from('admin_profiles')
        .select('id').eq('id', data.session.user.id).maybeSingle();
      if (adminProfile) window.location.href = 'admin.html';
    });
  </script>
</body>
</html>
