<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三線学習システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <script src="supabase-config.js"></script>
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    .bg-hero {
      background: linear-gradient(135deg, #0D4A56 0%, #1A7A8A 60%, #2BAEBF 100%);
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.18);
    }
    .inp {
      width: 100%;
      padding: 11px 13px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      transition: border-color .2s;
    }
    .inp:focus { outline: none; border-color: #1A7A8A; }
    .inp:disabled { background: #f9fafb; color: #9ca3af; cursor: not-allowed; }
    .btn-teal {
      background: linear-gradient(135deg, #1A7A8A, #2BAEBF);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-family: 'Noto Sans JP', sans-serif;
      transition: all .3s;
    }
    .btn-teal:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,122,138,.4); }
  </style>
</head>
<body class="bg-hero flex items-center justify-center p-4 min-h-screen">
  <div class="w-full max-w-sm">

    <div class="text-center mb-7">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-white/20 backdrop-blur-sm mb-3">
        <span class="text-4xl">🎵</span>
      </div>
      <h1 class="text-3xl font-bold text-white">三線 学習システム</h1>
      <p id="school-label" class="text-white/70 text-sm mt-1"></p>
    </div>

    <div class="card p-7">
      <!-- お知らせ -->
      <div id="announce" class="hidden bg-teal-50 border border-teal-200 rounded-xl px-4 py-3 mb-5 text-sm text-teal-800">
        <i class="fas fa-bullhorn mr-2"></i><span id="announce-text"></span>
      </div>

      <!-- ローディング -->
      <div id="loading" class="text-center py-8 text-gray-400">
        <i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i>
        <p class="text-sm">読み込み中...</p>
      </div>

      <!-- 学校URL未指定 -->
      <div id="no-school" class="hidden text-center py-8">
        <div class="text-5xl mb-3">🔗</div>
        <p class="font-semibold text-gray-700">学校URLが必要です</p>
        <p class="text-sm text-gray-400 mt-1">先生から配布されたURLからアクセスしてください</p>
      </div>

      <!-- クラスなし -->
      <div id="no-class" class="hidden text-center py-8">
        <div class="text-5xl mb-3">⚠️</div>
        <p class="font-semibold text-gray-700">クラスが設定されていません</p>
        <p class="text-sm text-gray-400 mt-1">先生に確認してください</p>
      </div>

      <!-- ログインフォーム -->
      <form id="login-form" class="hidden space-y-4" onsubmit="studentLogin(event)">
        <div class="grid grid-cols-3 gap-2">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">学年</label>
            <select id="grade" class="inp" required onchange="onGradeChange()">
              <option value="">選択</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">組</label>
            <select id="class" class="inp" required disabled>
              <option value="">--</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">出席番号</label>
            <input type="number" id="number" min="1" max="99" class="inp" placeholder="番号" required>
          </div>
        </div>
        <button type="submit" class="btn-teal">
          <i class="fas fa-user-graduate mr-2"></i>学習を開始する
        </button>
      </form>
    </div>
  </div>

  <script>
    let classesData = {};
    let schoolId = null;

    async function init() {
      const params = new URLSearchParams(window.location.search);
      schoolId = params.get('school');

      if (!schoolId) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('no-school').classList.remove('hidden');
        return;
      }

      await Promise.all([loadClasses(), loadAnnouncement()]);
    }

    async function loadClasses() {
      const { data, error } = await db
        .from('classes')
        .select('grade, class_name')
        .eq('school_id', schoolId)
        .eq('is_active', true)
        .order('grade')
        .order('class_name');

      document.getElementById('loading').classList.add('hidden');

      if (error || !data?.length) {
        document.getElementById('no-class').classList.remove('hidden');
        return;
      }

      data.forEach(row => {
        if (!classesData[row.grade]) classesData[row.grade] = [];
        classesData[row.grade].push(row.class_name);
      });

      const sel = document.getElementById('grade');
      Object.keys(classesData).sort().forEach(g => {
        const o = document.createElement('option');
        o.value = g; o.textContent = `${g}年`;
        sel.appendChild(o);
      });

      document.getElementById('login-form').classList.remove('hidden');
    }

    async function loadAnnouncement() {
      const { data } = await db
        .from('announcements')
        .select('title, content')
        .eq('school_id', schoolId)
        .eq('is_active', true)
        .order('is_pinned', { ascending: false })
        .order('created_at', { ascending: false })
        .limit(1);

      if (data?.length) {
        const text = data[0].content ? `${data[0].title}：${data[0].content}` : data[0].title;
        document.getElementById('announce-text').textContent = text;
        document.getElementById('announce').classList.remove('hidden');
      }
    }

    function onGradeChange() {
      const grade = document.getElementById('grade').value;
      const sel   = document.getElementById('class');
      sel.innerHTML = '<option value="">選択</option>';
      if (!grade || !classesData[grade]) { sel.disabled = true; return; }
      classesData[grade].forEach(c => {
        const o = document.createElement('option');
        o.value = c; o.textContent = `${c}組`;
        sel.appendChild(o);
      });
      sel.disabled = false;
    }

    function studentLogin(e) {
      e.preventDefault();
      const grade = document.getElementById('grade').value;
      const cls   = document.getElementById('class').value;
      const num   = document.getElementById('number').value;
      if (!grade || !cls || !num) { alert('すべての項目を入力してください。'); return; }

      localStorage.setItem('currentUser', JSON.stringify({
        grade, class: cls,
        number: parseInt(num),
        id: `${grade}${cls}${String(num).padStart(2, '0')}`,
        displayName: `${grade}年${cls}組${num}番`,
        school_id: schoolId,
        type: 'student'
      }));
      localStorage.setItem('userType', 'student');
      window.location.href = 'student.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
      localStorage.removeItem('currentUser');
      localStorage.removeItem('userType');
      init();
    });
  </script>
</body>
</html>
