<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三線学習システム - 学習画面</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <script src="supabase-config.js"></script>
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; background: #EEF6F7; }
    .header-gradient { background: linear-gradient(135deg, #0D4A56, #1A7A8A); }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,.06); }
    .task-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 10px; cursor: pointer;
      transition: background .15s;
    }
    .task-row:hover { background: #f0f9fa; }
    .task-row.done { background: #ECFDF5; }
    .task-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid #d1d5db;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .2s;
    }
    .task-row.done .task-check { background: #10B981; border-color: #10B981; color: #fff; }
    .task-title { flex: 1; font-size: 13.5px; line-height: 1.4; }
    .task-row.done .task-title { color: #065F46; }
    .memo-btn {
      padding: 4px 8px; border-radius: 6px; font-size: 11px;
      border: 1px solid #d1d5db; background: #fff; color: #6b7280;
      cursor: pointer; transition: all .15s; flex-shrink: 0;
    }
    .memo-btn:hover { border-color: #1A7A8A; color: #1A7A8A; }
    .memo-btn.has-memo { background: #e0f2fe; border-color: #7dd3fc; color: #0369a1; }
    .progress-bar-bg { background: #e5e7eb; border-radius: 999px; height: 10px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #1A7A8A, #2BAEBF); transition: width .4s; }
    .song-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; cursor: pointer;
      border-radius: 12px; transition: background .15s;
    }
    .song-header:hover { background: #f0f9fa; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 50; padding: 16px;
    }
    .modal-box { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    textarea { font-family: 'Noto Sans JP', sans-serif; }
    .btn-teal { background: linear-gradient(135deg, #1A7A8A, #2BAEBF); color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all .2s; }
    .btn-teal:hover { box-shadow: 0 4px 12px rgba(26,122,138,.4); }
    .btn-gray { background: #f3f4f6; color: #374151; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
    .btn-gray:hover { background: #e5e7eb; }
  </style>
</head>
<body>

  <div class="header-gradient text-white px-4 py-4">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <div>
        <div class="text-xs text-white/60 mb-0.5">三線学習システム</div>
        <div id="student-name" class="font-bold text-lg"></div>
      </div>
      <button onclick="logout()" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg transition-colors">
        <i class="fas fa-sign-out-alt mr-1"></i>終了
      </button>
    </div>
  </div>

  <div class="max-w-2xl mx-auto px-4 py-5 space-y-4">

    <div id="announce" class="hidden card px-4 py-3 bg-teal-50 border border-teal-200 text-sm text-teal-800">
      <i class="fas fa-bullhorn mr-2"></i><span id="announce-text"></span>
    </div>

    <div class="card p-4">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-semibold text-gray-700">全体の進捗</span>
        <span id="progress-pct" class="text-sm font-bold text-teal-700">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div id="progress-bar" class="progress-bar-fill" style="width:0%"></div>
      </div>
      <p id="progress-detail" class="text-xs text-gray-400 mt-1.5">読み込み中...</p>
    </div>

    <div id="loading" class="text-center py-10 text-gray-400">
      <i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i>
      <p class="text-sm">読み込み中...</p>
    </div>

    <div id="content" class="hidden space-y-4">
      <div class="card p-4">
        <h2 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
          <span class="w-7 h-7 bg-teal-100 text-teal-700 rounded-lg flex items-center justify-center text-sm"><i class="fas fa-tasks"></i></span>
          基礎課題
        </h2>
        <div id="koto-list" class="space-y-1"></div>
        <div id="koto-empty" class="hidden text-center py-3 text-sm text-gray-400">課題はまだ登録されていません</div>
      </div>

      <div id="songs-section">
        <h2 class="font-bold text-gray-700 px-1 mb-2 flex items-center gap-2">
          <span class="w-7 h-7 bg-amber-100 text-amber-700 rounded-lg flex items-center justify-center text-sm"><i class="fas fa-music"></i></span>
          楽曲
        </h2>
        <div id="songs-list" class="space-y-3"></div>
        <div id="songs-empty" class="hidden card text-center py-4 text-sm text-gray-400">楽曲はまだ登録されていません</div>
      </div>
    </div>
  </div>

  <!-- メモモーダル -->
  <div id="memo-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3 class="font-bold text-gray-800 mb-0.5" id="memo-task-title">メモ</h3>
      <p class="text-xs text-gray-400 mb-3">自分だけのメモを残せます</p>
      <textarea id="memo-text" rows="4"
        class="w-full border border-gray-300 rounded-xl p-3 text-sm resize-none focus:outline-none focus:border-teal-500"
        placeholder="例: 弾き方のコツ、練習内容..."></textarea>
      <div class="flex gap-2 mt-3 justify-end">
        <button class="btn-gray" onclick="closeMemo()">キャンセル</button>
        <button class="btn-teal" onclick="saveMemo()"><i class="fas fa-save mr-1"></i>保存</button>
      </div>
    </div>
  </div>

  <!-- 確認モーダル -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-box text-center">
      <div class="text-4xl mb-3">🔄</div>
      <p class="font-semibold text-gray-800 mb-1">達成を取り消しますか？</p>
      <p class="text-sm text-gray-400 mb-5">チェックを外します</p>
      <div class="flex gap-2">
        <button class="btn-gray flex-1" onclick="closeConfirm()">キャンセル</button>
        <button class="flex-1 bg-red-500 text-white border-none rounded-xl py-2.5 text-sm font-semibold cursor-pointer hover:bg-red-600 transition-colors"
          onclick="confirmUncheck()">取り消す</button>
      </div>
    </div>
  </div>

  <script>
    let student = null;
    let progressMap = {};
    let allTasks = [];
    let memoTarget = null;
    let uncheckTarget = null;

    async function init() {
      student = JSON.parse(localStorage.getItem('currentUser') || 'null');
      if (!student || student.type !== 'student') { window.location.href = 'index.html'; return; }
      document.getElementById('student-name').textContent = student.displayName;

      await Promise.all([loadProgress(), loadAnnouncement()]);
      await loadContent();
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');
      updateProgressBar();
    }

    async function loadProgress() {
      const { data } = await db.from('student_progress')
        .select('task_db_id, is_completed, memo')
        .eq('school_id', student.school_id)
        .eq('student_id', student.id);
      (data || []).forEach(r => {
        progressMap[r.task_db_id] = { is_completed: r.is_completed, memo: r.memo || '' };
      });
    }

    async function loadAnnouncement() {
      const { data } = await db.from('announcements')
        .select('title, content')
        .eq('school_id', student.school_id)
        .eq('is_active', true)
        .order('is_pinned', { ascending: false })
        .order('created_at', { ascending: false })
        .limit(1);
      if (data?.length) {
        document.getElementById('announce-text').textContent =
          data[0].content ? `${data[0].title}：${data[0].content}` : data[0].title;
        document.getElementById('announce').classList.remove('hidden');
      }
    }

    async function loadContent() {
      const [kotoRes, songsRes] = await Promise.all([
        db.from('koto_tasks').select('id, title, order_num').eq('school_id', student.school_id).eq('is_active', true).order('order_num'),
        db.from('songs').select('id, title, artist, order_num').eq('school_id', student.school_id).eq('is_active', true).order('order_num')
      ]);

      const kotoTasks = kotoRes.data || [];
      if (!kotoTasks.length) {
        document.getElementById('koto-empty').classList.remove('hidden');
      } else {
        kotoTasks.forEach(t => {
          allTasks.push({ id: t.id, title: t.title });
          document.getElementById('koto-list').appendChild(makeTaskRow(t.id, t.title));
        });
      }

      const songs = songsRes.data || [];
      if (!songs.length) {
        document.getElementById('songs-empty').classList.remove('hidden');
      } else {
        for (const song of songs) {
          const { data: stasks } = await db.from('song_tasks')
            .select('id, title, order_num')
            .eq('song_id', song.id)
            .eq('school_id', student.school_id)
            .order('order_num');

          const tasks = stasks || [];
          tasks.forEach(t => allTasks.push({ id: t.id, title: t.title }));

          const doneCount = tasks.filter(t => progressMap[t.id]?.is_completed).length;

          const card = document.createElement('div');
          card.className = 'card overflow-hidden';
          card.id = `song-${song.id}`;

          const hdr = document.createElement('div');
          hdr.className = 'song-header';
          hdr.innerHTML = `
            <div class="w-9 h-9 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center text-lg flex-shrink-0">🎵</div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-gray-800 text-sm truncate">${song.title}</div>
              ${song.artist ? `<div class="text-xs text-gray-400">${song.artist}</div>` : ''}
            </div>
            <div class="text-xs text-gray-400 flex-shrink-0" id="song-count-${song.id}">${doneCount}/${tasks.length}</div>
            <i class="fas fa-chevron-down text-gray-400 text-xs ml-1 transition-transform" id="song-chev-${song.id}"></i>
          `;

          const body = document.createElement('div');
          body.className = 'px-4 pb-3 space-y-1';
          body.id = `song-body-${song.id}`;

          if (!tasks.length) {
            body.innerHTML = '<p class="text-xs text-gray-400 py-2">課題はまだ登録されていません</p>';
          } else {
            tasks.forEach(t => body.appendChild(makeTaskRow(t.id, t.title)));
          }

          hdr.onclick = () => {
            body.classList.toggle('hidden');
            const ch = document.getElementById(`song-chev-${song.id}`);
            ch.style.transform = body.classList.contains('hidden') ? '' : 'rotate(180deg)';
          };

          card.appendChild(hdr);
          card.appendChild(body);
          document.getElementById('songs-list').appendChild(card);
        }
      }
    }

    function makeTaskRow(taskId, title) {
      const prog = progressMap[taskId] || { is_completed: false, memo: '' };
      const row = document.createElement('div');
      row.className = `task-row${prog.is_completed ? ' done' : ''}`;
      row.id = `task-${taskId}`;
      row.innerHTML = `
        <div class="task-check">${prog.is_completed ? '<i class="fas fa-check text-xs"></i>' : ''}</div>
        <div class="task-title">${title}</div>
        <button class="memo-btn${prog.memo ? ' has-memo' : ''}" data-task="${taskId}" data-title="${title.replace(/"/g, '&quot;')}">
          <i class="fas fa-sticky-note mr-0.5"></i>${prog.memo ? 'メモ有' : 'メモ'}
        </button>
      `;
      row.querySelector('.memo-btn').addEventListener('click', e => {
        e.stopPropagation();
        openMemo(taskId, title);
      });
      row.addEventListener('click', e => {
        if (e.target.closest('.memo-btn')) return;
        toggleTask(taskId);
      });
      return row;
    }

    async function toggleTask(taskId) {
      const prog = progressMap[taskId] || { is_completed: false, memo: '' };
      if (prog.is_completed) {
        uncheckTarget = taskId;
        document.getElementById('confirm-modal').classList.remove('hidden');
        return;
      }
      await setCompleted(taskId, true);
    }

    async function confirmUncheck() {
      closeConfirm();
      if (uncheckTarget) await setCompleted(uncheckTarget, false);
      uncheckTarget = null;
    }
    function closeConfirm() { document.getElementById('confirm-modal').classList.add('hidden'); }

    async function setCompleted(taskId, val) {
      if (!progressMap[taskId]) progressMap[taskId] = { is_completed: false, memo: '' };
      progressMap[taskId].is_completed = val;
      await db.from('student_progress').upsert({
        school_id: student.school_id, student_id: student.id,
        task_db_id: taskId, is_completed: val,
        memo: progressMap[taskId].memo, updated_at: new Date().toISOString()
      }, { onConflict: 'school_id,student_id,task_db_id' });
      refreshRow(taskId);
      updateProgressBar();
      if (val && allTasks.every(t => progressMap[t.id]?.is_completed)) {
        setTimeout(() => confetti({ particleCount: 200, spread: 80, origin: { y: 0.5 } }), 300);
      }
    }

    function refreshRow(taskId) {
      const row = document.getElementById(`task-${taskId}`);
      if (!row) return;
      const prog = progressMap[taskId];
      row.className = `task-row${prog.is_completed ? ' done' : ''}`;
      row.querySelector('.task-check').innerHTML = prog.is_completed ? '<i class="fas fa-check text-xs"></i>' : '';
      const mb = row.querySelector('.memo-btn');
      mb.className = `memo-btn${prog.memo ? ' has-memo' : ''}`;
      mb.innerHTML = `<i class="fas fa-sticky-note mr-0.5"></i>${prog.memo ? 'メモ有' : 'メモ'}`;
      // song count
      const sc = row.closest('[id^="song-"]');
      if (sc) {
        const sid = sc.id.replace('song-', '');
        const rows = sc.querySelectorAll('.task-row');
        const d = Array.from(rows).filter(r => r.classList.contains('done')).length;
        const el = document.getElementById(`song-count-${sid}`);
        if (el) el.textContent = `${d}/${rows.length}`;
      }
    }

    function updateProgressBar() {
      const total = allTasks.length;
      const done  = allTasks.filter(t => progressMap[t.id]?.is_completed).length;
      const pct   = total ? Math.round(done / total * 100) : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('progress-detail').textContent =
        total ? `${done} / ${total} 項目完了` : '課題が登録されていません';
    }

    function openMemo(taskId, title) {
      memoTarget = taskId;
      document.getElementById('memo-task-title').textContent = title;
      document.getElementById('memo-text').value = progressMap[taskId]?.memo || '';
      document.getElementById('memo-modal').classList.remove('hidden');
    }
    function closeMemo() { document.getElementById('memo-modal').classList.add('hidden'); memoTarget = null; }

    async function saveMemo() {
      if (!memoTarget) return;
      const memo = document.getElementById('memo-text').value.trim();
      if (!progressMap[memoTarget]) progressMap[memoTarget] = { is_completed: false, memo: '' };
      progressMap[memoTarget].memo = memo;
      await db.from('student_progress').upsert({
        school_id: student.school_id, student_id: student.id,
        task_db_id: memoTarget, is_completed: progressMap[memoTarget].is_completed,
        memo, updated_at: new Date().toISOString()
      }, { onConflict: 'school_id,student_id,task_db_id' });
      refreshRow(memoTarget);
      closeMemo();
    }

    function logout() {
      localStorage.removeItem('currentUser');
      localStorage.removeItem('userType');
      window.location.href = `index.html${student?.school_id ? '?school=' + student.school_id : ''}`;
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
