<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三線学習システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <script src="supabase-config.js"></script>
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; background: #F2F9F6; }
    .site-header { background: #fff; border-bottom: 2px solid #C8E8D8; }
    .tab-nav { background: #fff; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 20; }
    .tab-btn { padding: 13px 20px; font-size: 14px; font-weight: 500; color: #6b7280; cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; white-space: nowrap; }
    .tab-btn.active { color: #7BBAA8; border-bottom-color: #7BBAA8; font-weight: 700; }
    .tab-btn:hover:not(.active) { color: #7BBAA8; background: #EDF7F4; }

    /* Task card */
    .task-card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); border: 2px solid transparent; transition: all .25s; }
    .task-card.done { background: #EDF9F5; border-color: #A8DDD0; }
    .task-card.highlight { border-color: #7BBAA8; box-shadow: 0 4px 18px rgba(123,186,168,.2); }

    /* Number badge */
    .task-num { width: 30px; height: 30px; min-width: 30px; border-radius: 50%; background: #7BBAA8; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    .task-card.done .task-num { background: #5BA090; }

    /* Complete button */
    .kanryo-btn { background: #7BBAA8; color: #fff; border: none; border-radius: 20px; padding: 7px 18px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; transition: all .2s; }
    .kanryo-btn:hover { background: #6BAA98; box-shadow: 0 4px 12px rgba(123,186,168,.4); }
    .task-card.done .kanryo-btn { background: #D0EDE7; color: #2D7568; }

    /* Criteria box */
    .criteria-box { border-left: 3px solid #B8DDD4; padding: 8px 12px; margin-top: 10px; background: #F5FBF9; border-radius: 0 8px 8px 0; }
    .task-card.done .criteria-box { border-left-color: #A8DDD0; background: #EDF9F5; }

    /* Song pills */
    .song-pill { background: #fff; border: 2px solid #e5e7eb; border-radius: 20px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; color: #374151; }
    .song-pill.active { background: #7BBAA8; border-color: #7BBAA8; color: #fff; }
    .song-pill:hover:not(.active) { border-color: #7BBAA8; color: #7BBAA8; }

    /* Step circles */
    .step-circle { width: 30px; height: 30px; min-width: 30px; border-radius: 50%; border: 2px solid #d1d5db; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #9ca3af; }
    .step-circle.done { background: #7BBAA8; border-color: #7BBAA8; color: #fff; }

    /* Memo button */
    .memo-btn { background: transparent; border: 1px solid #e5e7eb; border-radius: 6px; padding: 4px 8px; font-size: 11px; color: #9ca3af; cursor: pointer; white-space: nowrap; transition: all .15s; }
    .memo-btn:hover { border-color: #7BBAA8; color: #7BBAA8; }
    .memo-btn.has-memo { background: #EDF9F5; border-color: #A8DDD0; color: #7BBAA8; }

    /* Learning points */
    .tips-box { background: #EDF9F5; border-radius: 16px; padding: 18px 20px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
    .modal-box { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    textarea { font-family: 'Noto Sans JP', sans-serif; }

    /* Logout button */
    .logout-btn { display: flex; align-items: center; gap: 6px; background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: background .2s; }
    .logout-btn:hover { background: #FEE2E2; }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <div class="site-header px-4 py-3">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <div class="font-bold text-gray-800 text-base">三線学習システム</div>
      <div class="flex items-center gap-3">
        <div class="text-right">
          <div id="student-name" class="text-xs font-semibold text-gray-500"></div>
          <span id="grade-badge" class="inline-block bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded-full mt-0.5"></span>
        </div>
        <button class="logout-btn" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i>ログアウト
        </button>
      </div>
    </div>
  </div>

  <!-- タブ -->
  <div class="tab-nav">
    <div class="max-w-2xl mx-auto flex">
      <button class="tab-btn active" id="tab-grade" onclick="showTab('grade')">
        <i class="fas fa-graduation-cap mr-1.5"></i>学年別課題
      </button>
      <button class="tab-btn" id="tab-song" onclick="showTab('song')">
        <i class="fas fa-music mr-1.5"></i>曲別課題
      </button>
    </div>
  </div>

  <!-- 学年別課題 -->
  <div id="panel-grade" class="max-w-2xl mx-auto px-4 py-4">
    <div id="grade-loading" class="text-center py-10 text-gray-400">
      <i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i>
      <p class="text-sm">読み込み中...</p>
    </div>
    <div id="grade-tasks" class="hidden"></div>
    <div id="grade-empty" class="hidden text-center py-10 text-gray-400 text-sm">課題が登録されていません</div>
  </div>

  <!-- 曲別課題 -->
  <div id="panel-song" class="hidden max-w-2xl mx-auto px-4 py-4">
    <div id="song-loading" class="text-center py-10 text-gray-400">
      <i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i>
      <p class="text-sm">読み込み中...</p>
    </div>
    <div id="song-content" class="hidden">
      <div id="song-pills" class="flex flex-wrap gap-2 mb-4"></div>
      <div id="song-task-area"></div>
    </div>
    <div id="song-empty" class="hidden text-center py-10 text-gray-400 text-sm">楽曲が登録されていません</div>
  </div>

  <!-- 学習のポイント（常時表示） -->
  <div class="max-w-2xl mx-auto px-4 pb-8 mt-2">
    <div class="tips-box">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-xl">💡</span>
        <span class="font-bold text-indigo-800 text-sm">学習のポイント</span>
      </div>
      <ul class="space-y-2">
        <li class="text-xs text-indigo-700 flex gap-2"><span>•</span><span>各課題は順番に取り組むことをお勧めします</span></li>
        <li class="text-xs text-indigo-700 flex gap-2"><span>•</span><span>達成基準をしっかり読んで、目標を理解してから練習しましょう</span></li>
        <li class="text-xs text-indigo-700 flex gap-2"><span>•</span><span>分からないことがあれば、遠慮なく先生に質問してください</span></li>
        <li class="text-xs text-indigo-700 flex gap-2"><span>•</span><span>【完了】ボタンは、達成基準を満たしたと確信した時に押してください</span></li>
      </ul>
    </div>
  </div>

  <!-- メモモーダル -->
  <div id="memo-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3 class="font-bold text-gray-800 mb-0.5" id="memo-task-title">メモ</h3>
      <p class="text-xs text-gray-400 mb-3">自分だけのメモを残せます</p>
      <textarea id="memo-text" rows="4" class="w-full border-2 border-gray-200 rounded-xl p-3 text-sm resize-none focus:outline-none focus:border-indigo-400" placeholder="例: 弾き方のコツ、練習内容..."></textarea>
      <div class="flex gap-2 mt-3 justify-end">
        <button class="bg-gray-100 text-gray-700 border-none rounded-lg px-4 py-2 text-sm cursor-pointer hover:bg-gray-200 font-family-inherit" style="font-family:inherit" onclick="closeMemo()">キャンセル</button>
        <button class="bg-indigo-600 text-white border-none rounded-lg px-4 py-2 text-sm font-semibold cursor-pointer hover:bg-indigo-700" style="font-family:inherit" onclick="saveMemo()"><i class="fas fa-save mr-1"></i>保存</button>
      </div>
    </div>
  </div>

  <!-- 確認モーダル -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-box text-center">
      <div class="text-4xl mb-3">🔄</div>
      <p class="font-semibold text-gray-800 mb-1">達成を取り消しますか？</p>
      <p class="text-sm text-gray-400 mb-5">チェックを外します</p>
      <div class="flex gap-2">
        <button class="flex-1 bg-gray-100 text-gray-700 border-none rounded-xl py-2.5 text-sm cursor-pointer hover:bg-gray-200" style="font-family:inherit" onclick="closeConfirm()">キャンセル</button>
        <button class="flex-1 bg-red-500 text-white border-none rounded-xl py-2.5 text-sm font-semibold cursor-pointer hover:bg-red-600" style="font-family:inherit" onclick="confirmUncheck()">取り消す</button>
      </div>
    </div>
  </div>

  <script>
    let student     = null;
    let progressMap = {}; // taskId → { is_completed, memo }
    let kotoTasks   = []; // { id, title, description, order_num }
    let allSongs    = []; // { id, title, artist }
    let songCache   = {}; // songId → [ { id, title, description } ]
    let currentSongId  = null;
    let memoTarget     = null;
    let uncheckTarget  = null;
    let songTabLoaded  = false;

    // ---- INIT ----

    async function init() {
      student = JSON.parse(localStorage.getItem('currentUser') || 'null');
      if (!student || student.type !== 'student') { window.location.href = 'index.html'; return; }
      document.getElementById('student-name').textContent = `${student.grade}年${student.class}組 出席番号:${student.number}番`;
      document.getElementById('grade-badge').textContent  = `${student.grade}年生`;
      await loadProgress();
      await loadGradeTasks();
    }

    async function loadProgress() {
      const { data } = await db.from('student_progress')
        .select('task_db_id, is_completed, memo')
        .eq('school_id', student.school_id)
        .eq('student_id', student.id);
      (data || []).forEach(r => {
        progressMap[r.task_db_id] = { is_completed: r.is_completed, memo: r.memo || '' };
      });
    }

    // ---- GRADE TASKS ----

    async function loadGradeTasks() {
      const { data } = await db.from('koto_tasks')
        .select('id, title, description, order_num')
        .eq('school_id', student.school_id)
        .eq('is_active', true)
        .order('order_num');

      document.getElementById('grade-loading').classList.add('hidden');
      kotoTasks = data || [];

      if (!kotoTasks.length) {
        document.getElementById('grade-empty').classList.remove('hidden');
        return;
      }

      const container = document.getElementById('grade-tasks');
      kotoTasks.forEach((t, i) => container.appendChild(makeCard(t.id, i + 1, t.title, t.description)));
      container.classList.remove('hidden');
    }

    // ---- SONG TASKS ----

    async function loadSongTab() {
      if (songTabLoaded) return;
      songTabLoaded = true;

      const { data } = await db.from('songs')
        .select('id, title, artist')
        .eq('school_id', student.school_id)
        .eq('is_active', true)
        .order('order_num');

      document.getElementById('song-loading').classList.add('hidden');
      allSongs = data || [];

      if (!allSongs.length) {
        document.getElementById('song-empty').classList.remove('hidden');
        return;
      }

      const pillsEl = document.getElementById('song-pills');
      allSongs.forEach((s, i) => {
        const btn = document.createElement('button');
        btn.className = `song-pill${i === 0 ? ' active' : ''}`;
        btn.id        = `pill-${s.id}`;
        btn.textContent = s.title;
        btn.onclick   = () => selectSong(s.id);
        pillsEl.appendChild(btn);
      });

      document.getElementById('song-content').classList.remove('hidden');
      await selectSong(allSongs[0].id);
    }

    async function selectSong(songId) {
      currentSongId = songId;
      allSongs.forEach(s => {
        const p = document.getElementById(`pill-${s.id}`);
        if (p) p.className = `song-pill${s.id === songId ? ' active' : ''}`;
      });

      if (!songCache[songId]) {
        const { data } = await db.from('song_tasks')
          .select('id, title, description, order_num')
          .eq('song_id', songId)
          .eq('school_id', student.school_id)
          .order('order_num');
        songCache[songId] = data || [];
      }

      const tasks = songCache[songId];
      const song  = allSongs.find(s => s.id === songId);
      const done  = tasks.filter(t => progressMap[t.id]?.is_completed).length;

      const area = document.getElementById('song-task-area');
      area.innerHTML = '';

      // Song header + step circles
      const hdr = document.createElement('div');
      hdr.className = 'bg-white rounded-2xl p-4 mb-3 flex items-center gap-3';
      hdr.innerHTML = `
        <div class="text-2xl">🎵</div>
        <div class="flex-1 min-w-0">
          <div class="font-bold text-gray-800 truncate">${song.title}</div>
          <div class="text-xs text-gray-400 mt-0.5">${done}/${tasks.length} 課題クリア</div>
        </div>
        <div class="flex gap-1.5 flex-shrink-0">
          ${tasks.map((t, i) => `<div class="step-circle${progressMap[t.id]?.is_completed ? ' done' : ''}">${i + 1}</div>`).join('')}
        </div>
      `;
      area.appendChild(hdr);

      if (!tasks.length) {
        area.innerHTML += '<p class="text-center text-sm text-gray-400 py-4">課題が登録されていません</p>';
        return;
      }

      tasks.forEach((t, i) => area.appendChild(makeCard(t.id, i + 1, t.title, t.description)));
    }

    // ---- TASK CARD ----

    function makeCard(taskId, num, title, description) {
      const prog = progressMap[taskId] || { is_completed: false, memo: '' };
      const el   = document.createElement('div');
      el.className = `task-card${prog.is_completed ? ' done' : ''}`;
      el.id        = `card-${taskId}`;

      const critHtml = description
        ? `<div class="criteria-box"><div class="text-xs font-bold text-gray-500 mb-1">達成基準</div><div class="text-sm text-gray-700">${description}</div></div>`
        : '';

      el.innerHTML = `
        <div class="flex items-center gap-3">
          <div class="task-num">${prog.is_completed ? '<i class="fas fa-check text-xs"></i>' : num}</div>
          <div class="flex-1 font-semibold text-gray-800 text-sm leading-snug">${title}</div>
          <button class="memo-btn${prog.memo ? ' has-memo' : ''}" id="memo-btn-${taskId}">
            <i class="fas fa-sticky-note mr-0.5"></i>${prog.memo ? 'メモ有' : 'メモ'}
          </button>
          <button class="kanryo-btn" id="done-btn-${taskId}">
            ${prog.is_completed ? '<i class="fas fa-check mr-1"></i>済み' : '完了'}
          </button>
        </div>
        ${critHtml}
      `;

      el.querySelector(`#memo-btn-${taskId}`).addEventListener('click', e => {
        e.stopPropagation();
        openMemo(taskId, title);
      });
      el.querySelector(`#done-btn-${taskId}`).addEventListener('click', () => toggleTask(taskId, num));
      return el;
    }

    function refreshCard(taskId, num) {
      const el = document.getElementById(`card-${taskId}`);
      if (!el) return;
      const prog = progressMap[taskId];
      el.className = `task-card${prog.is_completed ? ' done' : ''}`;
      el.querySelector('.task-num').innerHTML = prog.is_completed ? '<i class="fas fa-check text-xs"></i>' : num;
      const doneBtn = document.getElementById(`done-btn-${taskId}`);
      if (doneBtn) doneBtn.innerHTML = prog.is_completed ? '<i class="fas fa-check mr-1"></i>済み' : '完了';
      const memoBtn = document.getElementById(`memo-btn-${taskId}`);
      if (memoBtn) {
        memoBtn.className = `memo-btn${prog.memo ? ' has-memo' : ''}`;
        memoBtn.innerHTML = `<i class="fas fa-sticky-note mr-0.5"></i>${prog.memo ? 'メモ有' : 'メモ'}`;
      }
    }

    // ---- TOGGLE / SAVE ----

    async function toggleTask(taskId, num) {
      const prog = progressMap[taskId] || { is_completed: false, memo: '' };
      if (prog.is_completed) {
        uncheckTarget = { taskId, num };
        document.getElementById('confirm-modal').classList.remove('hidden');
        return;
      }
      await setCompleted(taskId, num, true);
      // brief highlight
      const card = document.getElementById(`card-${taskId}`);
      if (card) { card.classList.add('highlight'); setTimeout(() => card.classList.remove('highlight'), 1200); }
    }

    async function confirmUncheck() {
      closeConfirm();
      if (uncheckTarget) { await setCompleted(uncheckTarget.taskId, uncheckTarget.num, false); uncheckTarget = null; }
    }
    function closeConfirm() { document.getElementById('confirm-modal').classList.add('hidden'); }

    async function setCompleted(taskId, num, val) {
      if (!progressMap[taskId]) progressMap[taskId] = { is_completed: false, memo: '' };
      progressMap[taskId].is_completed = val;

      await db.from('student_progress').upsert({
        school_id: student.school_id, student_id: student.id,
        task_db_id: taskId, is_completed: val,
        memo: progressMap[taskId].memo, updated_at: new Date().toISOString()
      }, { onConflict: 'school_id,student_id,task_db_id' });

      refreshCard(taskId, num);

      // refresh song header if in song tab
      if (currentSongId && songCache[currentSongId]?.some(t => t.id === taskId)) {
        const tasks = songCache[currentSongId];
        const done  = tasks.filter(t => progressMap[t.id]?.is_completed).length;
        const song  = allSongs.find(s => s.id === currentSongId);
        const hdr   = document.getElementById('song-task-area')?.querySelector('.bg-white');
        if (hdr) {
          hdr.querySelector('.text-xs').textContent = `${done}/${tasks.length} 課題クリア`;
          const circles = hdr.querySelectorAll('.step-circle');
          tasks.forEach((t, i) => {
            if (circles[i]) circles[i].className = `step-circle${progressMap[t.id]?.is_completed ? ' done' : ''}`;
          });
        }
      }

      // confetti if all done
      const allIds = [...kotoTasks, ...Object.values(songCache).flat()].map(t => t.id);
      if (val && allIds.every(id => progressMap[id]?.is_completed)) {
        setTimeout(() => confetti({ particleCount: 200, spread: 80, origin: { y: 0.5 } }), 300);
      }
    }

    // ---- MEMO ----

    function openMemo(taskId, title) {
      memoTarget = { taskId, title };
      document.getElementById('memo-task-title').textContent = title;
      document.getElementById('memo-text').value = progressMap[taskId]?.memo || '';
      document.getElementById('memo-modal').classList.remove('hidden');
    }
    function closeMemo() { document.getElementById('memo-modal').classList.add('hidden'); memoTarget = null; }

    async function saveMemo() {
      if (!memoTarget) return;
      const { taskId } = memoTarget;
      const memo = document.getElementById('memo-text').value.trim();
      if (!progressMap[taskId]) progressMap[taskId] = { is_completed: false, memo: '' };
      progressMap[taskId].memo = memo;

      await db.from('student_progress').upsert({
        school_id: student.school_id, student_id: student.id,
        task_db_id: taskId, is_completed: progressMap[taskId].is_completed,
        memo, updated_at: new Date().toISOString()
      }, { onConflict: 'school_id,student_id,task_db_id' });

      const koto = kotoTasks.find(t => t.id === taskId);
      const num  = koto ? kotoTasks.indexOf(koto) + 1
        : (songCache[currentSongId]?.findIndex(t => t.id === taskId) ?? -1) + 1;
      if (num > 0) refreshCard(taskId, num);
      closeMemo();
    }

    // ---- TABS ----

    function showTab(tab) {
      document.getElementById('panel-grade').classList.toggle('hidden', tab !== 'grade');
      document.getElementById('panel-song').classList.toggle('hidden', tab !== 'song');
      document.getElementById('tab-grade').className = `tab-btn${tab === 'grade' ? ' active' : ''}`;
      document.getElementById('tab-song').className  = `tab-btn${tab === 'song'  ? ' active' : ''}`;
      if (tab === 'song') loadSongTab();
    }

    function logout() {
      localStorage.removeItem('currentUser');
      localStorage.removeItem('userType');
      window.location.href = `index.html${student?.school_id ? '?school=' + student.school_id : ''}`;
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
